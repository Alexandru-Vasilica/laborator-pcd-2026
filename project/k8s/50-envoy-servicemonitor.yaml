apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dlb-envoy
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - dlb
  selector:
    matchLabels:
      app: dlb-envoy
  endpoints:
    - port: admin
      path: /stats/prometheus
      interval: 15s
