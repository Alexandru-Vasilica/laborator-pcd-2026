apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlb-worker-slow
  namespace: dlb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlb-worker
      tier: slow
  template:
    metadata:
      labels:
        app: dlb-worker
        tier: slow
    spec:
      containers:
        - name: worker
          image: dlb-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BASE_DELAY_MS
              value: "300"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 128Mi
